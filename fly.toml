app = "traitors"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  TRAITORS_ENV = "production"
  TRAITORS_PORT = "8080"
  TRAITORS_DB_PATH = "/data/traitors.db"
  TRAITORS_LOG_FORMAT = "json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "traitors_data"
  destination = "/data"
  initial_size = "1"

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
