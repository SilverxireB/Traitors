dbs:
  - path: /data/traitors.db
    replicas:
      - type: s3
        bucket: traitors-backups
        path: replica
        endpoint: ${LITESTREAM_S3_ENDPOINT}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
        retention: 720h
        retention-check-interval: 1h
        sync-interval: 1s
